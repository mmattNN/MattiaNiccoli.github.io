<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Florence Votes — Electoral Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0d0d0d; --bg2:#141414; --bg3:#1c1c1c;
      --accent:#c8a96e; --accent2:#6e9ec8;
      --gain:#bf3a3a; --loss:#3a7abf;
      --text:#e8e4dc; --muted:#6b6760; --border:#252525;
      --topbar-h: 46px;
      --panel-w: 300px;
      --bar-h: 130px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; }

    /* ─── TOPBAR ─── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .8rem;
      padding: 0 1rem; z-index: 600;
    }
    .back-link { font-family:'DM Mono',monospace; font-size:.65rem; color:var(--muted); text-decoration:none; letter-spacing:.1em; white-space:nowrap; }
    .back-link:hover { color:var(--accent); }
    .topbar-title { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--accent); letter-spacing:.1em; white-space:nowrap; }
    .search-wrap { flex:1; position:relative; max-width:340px; }
    .search-wrap input { width:100%; background:var(--bg3); color:var(--text); border:1px solid var(--border); padding:.32rem 2rem .32rem .65rem; font-family:'DM Sans',sans-serif; font-size:.75rem; outline:none; }
    .search-wrap input:focus { border-color:var(--accent); }
    .search-wrap input::placeholder { color:var(--muted); }
    .search-btn { position:absolute; right:0; top:0; bottom:0; padding:0 .5rem; background:none; border:none; color:var(--muted); cursor:pointer; }
    .search-results { position:absolute; top:100%; left:0; right:0; background:var(--bg2); border:1px solid var(--border); border-top:none; z-index:700; max-height:180px; overflow-y:auto; display:none; }
    .sri { padding:.4rem .7rem; font-size:.72rem; color:var(--muted); cursor:pointer; border-bottom:1px solid var(--border); }
    .sri:hover { background:var(--bg3); color:var(--text); }
    .bm-group { display:flex; gap:.2rem; }
    .bm-btn { font-family:'DM Mono',monospace; font-size:.55rem; padding:.22rem .45rem; background:var(--bg3); color:var(--muted); border:1px solid var(--border); cursor:pointer; transition:all .15s; white-space:nowrap; }
    .bm-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }
    .layer-btn { font-family:'DM Mono',monospace; font-size:.55rem; padding:.22rem .45rem; background:var(--bg3); border:1px solid var(--border); cursor:pointer; color:var(--muted); }
    .layer-btn.on { color:#6ec86e; border-color:#6ec86e; }

    /* ─── MAP ─── */
    #map { position: fixed; z-index: 10; background: var(--bg); }

    /* ─── DESKTOP PANEL (left) ─── */
    #deskPanel {
      position: fixed;
      top: var(--topbar-h); left: 0;
      width: var(--panel-w); bottom: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      z-index: 100;
    }
    #deskPanel::-webkit-scrollbar { width:3px; }
    #deskPanel::-webkit-scrollbar-thumb { background:var(--border); }

    #panelResizeHandle {
      position: fixed; top: var(--topbar-h); bottom: 0;
      left: var(--panel-w); width: 6px;
      cursor: col-resize; z-index: 200; background: transparent;
    }
    #panelResizeHandle:hover { background: rgba(200,169,110,.3); }

    /* ─── DESKTOP BAR CHART ─── */
    #deskBar {
      position: fixed; bottom: 0; z-index: 100;
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: .45rem .8rem .35rem;
    }
    #barResizeHandle {
      position: absolute; top: -4px; left: 0; right: 0;
      height: 8px; cursor: row-resize; z-index: 201; background: transparent;
    }
    #barResizeHandle:hover { background: rgba(200,169,110,.3); }
    .bar-label { font-family:'DM Mono',monospace; font-size:.55rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:.25rem; }
    #barChartWrap { height: calc(100% - 20px); }

    /* ─── PANEL SECTIONS ─── */
    .ps { padding:.9rem 1.1rem; border-bottom:1px solid var(--border); flex-shrink:0; }
    .psl { font-family:'DM Mono',monospace; font-size:.55rem; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; margin-bottom:.7rem; }
    .cg { margin-bottom:.75rem; }
    .cg:last-child { margin-bottom:0; }
    .cl { font-family:'DM Mono',monospace; font-size:.57rem; color:var(--muted); letter-spacing:.08em; margin-bottom:.28rem; display:block; }
    select { width:100%; background:var(--bg3); color:var(--text); border:1px solid var(--border); padding:.4rem .55rem; font-family:'DM Sans',sans-serif; font-size:.76rem; appearance:none; cursor:pointer; outline:none; }
    select:focus { border-color:var(--accent); }
    .tr { display:flex; gap:.25rem; }
    .tb { flex:1; padding:.35rem 0; font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.05em; text-transform:uppercase; background:var(--bg3); color:var(--muted); border:1px solid var(--border); cursor:pointer; transition:all .15s; }
    .tb.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }
    .info-box { min-height:72px; display:flex; flex-direction:column; justify-content:center; }
    .ip { font-family:'DM Mono',monospace; font-size:.6rem; color:var(--border); text-align:center; letter-spacing:.08em; }
    .isez { font-family:'DM Mono',monospace; font-size:.57rem; color:var(--muted); letter-spacing:.08em; margin-bottom:.2rem; display:flex; align-items:center; gap:.35rem; }
    .ldot { width:5px; height:5px; border-radius:50%; background:var(--accent); display:inline-block; }
    .ival { font-family:'Playfair Display',serif; font-size:1.45rem; font-weight:700; line-height:1.1; margin-bottom:.2rem; }
    .isub { font-family:'DM Mono',monospace; font-size:.57rem; color:var(--muted); letter-spacing:.06em; }
    .iparens { font-family:'DM Mono',monospace; font-size:.55rem; color:#4a4a4a; margin-top:.35rem; letter-spacing:.04em; font-style:italic; }

    /* ─── LEGEND BAR + TICK ─── */
    .leg-bar { height:7px; border-radius:1px; margin-bottom:.28rem; position:relative; }
    .leg-tick { position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--accent); display:none; box-shadow:0 0 6px rgba(200,169,110,.7); pointer-events:none; transition:left .12s ease; }
    .leg-tick-val { position:absolute; bottom:100%; left:50%; transform:translateX(-50%); font-family:'DM Mono',monospace; font-size:.55rem; color:var(--accent); background:var(--bg2); padding:1px 4px; border:1px solid var(--border); white-space:nowrap; margin-bottom:3px; }
    .leg-labs { display:flex; justify-content:space-between; font-family:'DM Mono',monospace; font-size:.55rem; color:var(--muted); }

    /* ─── PIE / DELTA BARS WRAP ─── */
    .pie-wrap { height:150px; display:flex; align-items:center; justify-content:center; position:relative; }
    .ce { font-family:'DM Mono',monospace; font-size:.58rem; color:var(--border); letter-spacing:.08em; text-align:center; }

    /* ─── MOBILE CONTROLS ─── */
    #mobileControls {
      position: fixed; left: 0; right: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: .6rem .9rem; z-index: 300; display: none;
    }
    .mcg { display:grid; grid-template-columns:1fr 1fr; gap:.45rem; margin-bottom:.45rem; }

    /* ─── MOBILE FLOATING LEGEND (always visible) ─── */
    #mFloatingLegend {
      position: fixed;
      z-index: 250;
      background: rgba(20,20,20,.94);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: .45rem .6rem .35rem;
      display: none;
      pointer-events: none;
      border-radius: 4px;
    }
    .mfl-title { font-family:'DM Mono',monospace; font-size:.5rem; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:.25rem; }
    .mfl-bar { height:6px; border-radius:1px; margin-bottom:.22rem; position:relative; }
    .mfl-tick { position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--accent); display:none; box-shadow:0 0 5px rgba(200,169,110,.7); transition:left .12s ease; }
    .mfl-labs { display:flex; justify-content:space-between; font-family:'DM Mono',monospace; font-size:.5rem; color:var(--muted); }

    /* ─── MOBILE BOTTOM SHEET ─── */
    #mSheetBackdrop {
      position: fixed; inset: 0;
      background: rgba(13,13,13,.65);
      z-index: 450;
      display: none; opacity: 0;
      transition: opacity .25s;
    }
    #mSheetBackdrop.show { display: block; opacity: 1; }
    #mSheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: 78vh;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      z-index: 460;
      transform: translateY(100%);
      transition: transform .28s ease;
      display: flex; flex-direction: column;
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,.5);
    }
    #mSheet.show { transform: translateY(0); }
    .ms-handle { width:38px; height:4px; background:var(--border); border-radius:2px; margin:.55rem auto .45rem; flex-shrink:0; }
    .ms-header { display:flex; justify-content:space-between; align-items:center; padding:.2rem 1rem .55rem; border-bottom:1px solid var(--border); flex-shrink:0; }
    .ms-title { font-family:'DM Mono',monospace; font-size:.7rem; color:var(--accent); letter-spacing:.12em; text-transform:uppercase; }
    .ms-close { background:none; border:none; color:var(--muted); font-size:1.3rem; line-height:1; cursor:pointer; padding:.2rem .5rem; transition:color .15s; }
    .ms-close:hover { color:var(--text); }
    .ms-body { flex:1; overflow-y:auto; padding:.9rem 1rem 1.4rem; }
    .ms-body::-webkit-scrollbar { width:3px; }
    .ms-body::-webkit-scrollbar-thumb { background:var(--border); }
    .ms-section { margin-bottom:1.2rem; }
    .ms-section:last-child { margin-bottom:0; }
    .ms-pie-wrap { height:200px; position:relative; }
    .ms-bar-wrap { height:170px; }

    /* ─── LOADING ─── */
    #loading {
      position: fixed; inset: 0; z-index: 800;
      background: rgba(13,13,13,.88);
      display: flex; align-items: center; justify-content: center;
      font-family:'DM Mono',monospace; font-size:.7rem; color:var(--accent); letter-spacing:.2em;
    }
    #loading.hidden { display:none; }

    /* ─── LEAFLET OVERRIDES ─── */
    .leaflet-container { background: #2a2a2a; }
    .leaflet-control-zoom a { background:var(--bg2)!important; color:var(--muted)!important; border-color:var(--border)!important; }
    .leaflet-control-zoom a:hover { background:var(--bg3)!important; color:var(--text)!important; }
    .leaflet-control-attribution { background:rgba(13,13,13,.7)!important; color:var(--muted)!important; font-size:.55rem!important; }
    .leaflet-control-attribution a { color:var(--muted)!important; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <a href="../../index.html" class="back-link">← Back</a>
  <span class="topbar-title" id="topbarTitle">Florence & Sesto — Electoral Atlas</span>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search address…" autocomplete="off"/>
    <button class="search-btn" id="searchBtn">⌕</button>
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="bm-group">
    <button class="bm-btn active" data-bm="light">Light</button>
    <button class="bm-btn" data-bm="dark">Dark</button>
    <button class="bm-btn" data-bm="sat">Sat</button>
    <button class="bm-btn" data-bm="osm">OSM</button>
  </div>
  <button class="layer-btn on" id="layerToggle">● ON</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LOADING -->
<div id="loading" class="hidden">LOADING…</div>

<!-- ─── DESKTOP PANEL ─── -->
<div id="deskPanel">
  <div class="ps">
    <div class="psl">Controls</div>
    <div class="cg"><label class="cl">Election</label>
      <select id="electionSelect">
        <option value="amm2024">Comunali 2024</option>
        <option value="reg2025">Regionali 2025</option>
        <option value="diff">Differences 2025–2024</option>
      </select>
    </div>
    <div class="cg"><label class="cl">Party / List</label><select id="partySelect"></select></div>
    <div class="cg"><label class="cl">Metric</label>
      <div class="tr">
        <button class="tb active" data-metric="pct">% Share</button>
        <button class="tb" data-metric="voti">Abs. Votes</button>
      </div>
    </div>
  </div>
  <div class="ps">
    <div class="psl">Selected Sezione</div>
    <div class="info-box" id="infoBox"><p class="ip">— hover or click —</p></div>
  </div>
  <div class="ps">
    <div class="psl">Legend</div>
    <div class="leg-bar" id="legendBar">
      <div class="leg-tick" id="legendTick"><div class="leg-tick-val" id="legendTickVal"></div></div>
    </div>
    <div class="leg-labs"><span id="lgMin"></span><span id="lgMid"></span><span id="lgMax"></span></div>
  </div>
  <div class="ps" style="flex:1">
    <div class="psl" id="breakdownLbl">Sezione breakdown</div>
    <div class="pie-wrap"><p class="ce" id="pieEmpty">Click a sezione</p><canvas id="pieChart" style="display:none"></canvas></div>
  </div>
</div>
<div id="panelResizeHandle"></div>

<!-- ─── DESKTOP BAR ─── -->
<div id="deskBar">
  <div id="barResizeHandle"></div>
  <div class="bar-label">All sezioni ranked — hover to highlight, click to lock + zoom</div>
  <div id="barChartWrap"><canvas id="barChart"></canvas></div>
</div>

<!-- ─── MOBILE CONTROLS ─── -->
<div id="mobileControls">
  <div class="mcg">
    <div class="cg" style="margin:0"><label class="cl">Election</label>
      <select id="m_electionSelect">
        <option value="amm2024">Comunali 2024</option>
        <option value="reg2025">Regionali 2025</option>
        <option value="diff">Differences 2025–2024</option>
      </select>
    </div>
    <div class="cg" style="margin:0"><label class="cl">Party</label><select id="m_partySelect"></select></div>
  </div>
  <div class="tr">
    <button class="tb active" data-mmetric="pct">% Share</button>
    <button class="tb" data-mmetric="voti">Abs. Votes</button>
  </div>
</div>

<!-- ─── MOBILE FLOATING LEGEND ─── -->
<div id="mFloatingLegend">
  <div class="mfl-title" id="mflTitle">Legend</div>
  <div class="mfl-bar" id="mflBar">
    <div class="mfl-tick" id="mflTick"></div>
  </div>
  <div class="mfl-labs"><span id="mflMin"></span><span id="mflMax"></span></div>
</div>

<!-- ─── MOBILE BOTTOM SHEET ─── -->
<div id="mSheetBackdrop"></div>
<div id="mSheet">
  <div class="ms-handle"></div>
  <div class="ms-header">
    <span class="ms-title" id="mSheetTitle">Sezione —</span>
    <button class="ms-close" id="mSheetClose">✕</button>
  </div>
  <div class="ms-body">
    <div class="ms-section">
      <div id="mSheetInfo"><p class="ip" style="text-align:left">—</p></div>
    </div>
    <div class="ms-section">
      <div class="psl" style="margin-bottom:.5rem" id="mSheetBreakdownLbl">Breakdown</div>
      <div class="ms-pie-wrap"><canvas id="mSheetPie"></canvas></div>
    </div>
    <div class="ms-section">
      <div class="psl" style="margin-bottom:.5rem">All sezioni ranked</div>
      <div class="ms-bar-wrap"><canvas id="mSheetBar"></canvas></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const DATA_URLS = {
  amm2024:'./data/Amministrative_2024.geojson',
  reg2025:'./data/Regionali_2025.geojson',
  diff:   './data/Differenze_2025_2024.geojson'
}

const PARTIES = {
  amm2024:[
    {id:'PARTITO_DEMOCRATICO_SARA_FUNARO_SINDACA',label:'PD',color:'#cc2222'},
    {id:'FRATELLI_DITALIA_GIORGIA_MELONI',label:'FdI',color:'#1a3a8f'},
    {id:'PARTITO_POPOLARE_EUROPEO_FORZA_ITALIA_BERLUSCONI_SCHMIDT_SINDACO',label:'FI',color:'#0070bb'},
    {id:'LISTA_CIVICA_EIKE_SCHMIDT_SINDACO',label:'Schmidt (civ.)',color:'#4a90a4'},
    {id:'LEGA_SCHMIDT_SINDACO',label:'Lega',color:'#009fe3'},
    {id:'MOVIMENTO_5_STELLE_2050',label:'M5S',color:'#c8a900'},
    {id:'ALLEANZA_VERDI_SINISTRA',label:'AVS',color:'#00875a'},
    {id:'SINISTRA_PROGETTO_COMUNE',label:'Sinistra PC',color:'#8b1a1a'},
    {id:'SIAMO_EUROPEI_AZIONE_CON_CALENDA',label:'Azione',color:'#e07b00'},
    {id:'SARA_FUNARO_SINDACA',label:'Funaro (civ.)',color:'#e8a0a0'},
    {id:'FIRENZE_CAMBIA_ZINI_FRANCESCO_SINDACO',label:'FI Cambia',color:'#7a9e7e'},
    {id:'RIBELLA_FIRENZE',label:'Ribella FI',color:'#9b6b9b'},
    {id:'AL_CENTRO_CON_SACCARDI',label:'Al Centro',color:'#b8860b'},
    {id:'FIRENZE_AMBIENTALISTA_E_SOLIDALE_CITTADI_PACE',label:'Amb. Solidale',color:'#2e8b57'},
    {id:'FIRENZE_VERA',label:'FI Vera',color:'#cd853f'},
    {id:'FIRENZE_DEMOCRATICA_CON_CECILIA_DEL_RE',label:'FI Democratica',color:'#da70d6'},
    {id:'FIRENZE_RINASCE',label:'FI Rinasce',color:'#708090'},
    {id:'ANIMA_FIRENZE',label:'Anima FI',color:'#a0522d'},
    {id:'piuEUROPA',label:'+Europa',color:'#4169e1'},
    {id:'CENTRO',label:'Centro',color:'#808080'},
  ],
  reg2025:[
    {id:'PARTITO_DEMOCRATICO',label:'PD',color:'#cc2222'},
    {id:'FRATELLI_DITALIA',label:'FdI',color:'#1a3a8f'},
    {id:'FORZA_ITALIA_UDC_TOMASI_PRESIDENTE',label:'FI',color:'#0070bb'},
    {id:'LEGA_TOSCANA',label:'Lega',color:'#009fe3'},
    {id:'MOVIMENTO_5_STELLE',label:'M5S',color:'#c8a900'},
    {id:'ALLEANZA_VERDI_E_SINISTRA',label:'AVS',color:'#00875a'},
    {id:'TOSCANA_ROSSA',label:'Toscana Rossa',color:'#8b1a1a'},
    {id:'EUGENIO_GIANI_PRESIDENTE_CASA_RIFORMISTA',label:'Casa Riformista',color:'#e07b00'},
    {id:'NOI_MODERATI_CIVICI_PER_TOMASI',label:'Noi Moderati',color:'#b8860b'},
    {id:'E_ORA_LISTA_CIVICA_TOMASI_PRESIDENTE',label:'È Ora (civ.)',color:'#4a90a4'},
  ],
  diff:[
    {id:'PD',label:'PD ∆',color:'#cc2222'},
    {id:'FdI',label:'FdI ∆',color:'#1a3a8f'},
    {id:'FI',label:'FI ∆',color:'#0070bb'},
    {id:'Lega',label:'Lega ∆',color:'#009fe3'},
    {id:'M5S',label:'M5S ∆',color:'#c8a900'},
    {id:'AVS',label:'AVS ∆',color:'#00875a'},
    {id:'ToscanaRossa',label:'Toscana Rossa ∆',color:'#8b1a1a'},
  ]
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = { election:'amm2024', party:PARTIES.amm2024[0], metric:'pct', locked:null, layerOn:true, data:{} }
let lockedBarIdx = null

// ── LAYOUT ────────────────────────────────────────────────────────────────────
const TOPBAR_H = 46
let panelW = 300
let barH = 130

function isMobile(){ return window.innerWidth <= 700 }

function positionMap(){
  const mapEl = document.getElementById('map')
  if(isMobile()){
    const ctrlH = document.getElementById('mobileControls').offsetHeight || 90
    mapEl.style.top    = (TOPBAR_H + ctrlH) + 'px'
    mapEl.style.left   = '0'
    mapEl.style.right  = '0'
    mapEl.style.bottom = '0'
    // floating legend position
    const fl = document.getElementById('mFloatingLegend')
    fl.style.top   = (TOPBAR_H + ctrlH + 8) + 'px'
    fl.style.right = '8px'
    fl.style.width = '160px'
  } else {
    mapEl.style.top    = TOPBAR_H + 'px'
    mapEl.style.left   = panelW + 'px'
    mapEl.style.right  = '0'
    mapEl.style.bottom = barH + 'px'
    document.getElementById('deskPanel').style.width = panelW + 'px'
    document.getElementById('panelResizeHandle').style.left = panelW + 'px'
    document.getElementById('deskBar').style.left = panelW + 'px'
    document.getElementById('deskBar').style.right = '0'
    document.getElementById('deskBar').style.height = barH + 'px'
    document.getElementById('deskBar').style.bottom = '0'
  }
  setTimeout(()=> map.invalidateSize(), 80)
}

function showMobileUI(show){
  document.getElementById('mobileControls').style.display = show ? 'block' : 'none'
  document.getElementById('mFloatingLegend').style.display = show ? 'block' : 'none'
  document.getElementById('deskPanel').style.display = show ? 'none' : 'flex'
  document.getElementById('panelResizeHandle').style.display = show ? 'none' : 'block'
  document.getElementById('deskBar').style.display = show ? 'none' : 'block'
  document.getElementById('topbarTitle').style.display = show ? 'none' : ''
  if(!show){ closeMobileSheet(false) }
}

function applyLayout(){ showMobileUI(isMobile()); positionMap() }

// ── COLOR ─────────────────────────────────────────────────────────────────────
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function lerp(c1,c2,t){
  const[r1,g1,b1]=typeof c1==='string'?hexRgb(c1):c1
  const[r2,g2,b2]=typeof c2==='string'?hexRgb(c2):c2
  t=Math.max(0,Math.min(1,t))
  return`rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`
}
let currentRange={min:0,max:100}
function computeRange(gj,field){
  const v=gj.features.map(f=>f.properties[field]).filter(v=>v!=null&&!isNaN(v))
  return{min:Math.min(...v),max:Math.max(...v)}
}
function getColor(v){
  if(v==null||isNaN(v))return'#1c1c1c'
  if(S.election==='diff'){
    const am=Math.max(Math.abs(currentRange.min),Math.abs(currentRange.max))||1
    const t=v/am
    if(t<0)return lerp('#ffffff','#3a7abf',Math.min(-t,1))
    if(t>0)return lerp('#ffffff','#bf3a3a',Math.min(t,1))
    return'#ffffff'
  }
  const{min,max}=currentRange
  return lerp('#1a1a1a',S.party.color,max===min?.5:(v-min)/(max-min))
}

// ── LEGEND ────────────────────────────────────────────────────────────────────
function updateLegend(){
  const isDiff = S.election==='diff'
  const u = S.metric==='pct' ? '%' : ' v'
  const diffUnit = S.metric==='pct' ? 'pp' : 'voti'
  const am = Math.max(Math.abs(currentRange.min),Math.abs(currentRange.max)).toFixed(1)
  const grad = isDiff ? 'linear-gradient(to right,#3a7abf,#fff,#bf3a3a)' : `linear-gradient(to right,#1a1a1a,${S.party.color})`
  const minTxt = isDiff ? `-${am} ${diffUnit}` : `${currentRange.min.toFixed(1)}${u}`
  const midTxt = isDiff ? '0' : ''
  const maxTxt = isDiff ? `+${am} ${diffUnit}` : `${currentRange.max.toFixed(1)}${u}`
  const lb = document.getElementById('legendBar'); if(lb) lb.style.background = grad
  const mfb = document.getElementById('mflBar'); if(mfb) mfb.style.background = grad
  const set = (id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v }
  set('lgMin',minTxt); set('lgMid',midTxt); set('lgMax',maxTxt)
  set('mflMin',minTxt); set('mflMax',maxTxt)
  set('mflTitle', isDiff ? `${S.party.label.replace(' ∆','')} · ∆ 2025-2024` : `${S.party.label} · ${S.metric==='pct'?'%':'voti'}`)
  clearLegendTick()
}

function legendPctFromValue(v){
  if(v==null||isNaN(v)) return null
  if(S.election==='diff'){
    const am=Math.max(Math.abs(currentRange.min),Math.abs(currentRange.max))||1
    return Math.max(0,Math.min(100,(v/am+1)/2*100))
  }
  const{min,max}=currentRange
  return max===min ? 50 : Math.max(0,Math.min(100,(v-min)/(max-min)*100))
}

function updateLegendTick(value){
  const pct = legendPctFromValue(value)
  const ticks = [
    {tick:document.getElementById('legendTick'), val:document.getElementById('legendTickVal')},
    {tick:document.getElementById('mflTick'), val:null}
  ]
  if(pct==null){
    ticks.forEach(({tick})=>{ if(tick) tick.style.display='none' })
    return
  }
  const u = S.election==='diff' ? (S.metric==='pct'?' pp':' voti') : (S.metric==='pct'?'%':' v')
  const sign = S.election==='diff' && value>0 ? '+' : ''
  const txt = `${sign}${(+value).toFixed(1)}${u}`
  ticks.forEach(({tick,val})=>{
    if(tick){ tick.style.left = pct+'%'; tick.style.display='block' }
    if(val) val.textContent = txt
  })
}

function clearLegendTick(){
  ['legendTick','mflTick'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none'
  })
}

// ── FIELDS ────────────────────────────────────────────────────────────────────

  return S.metric==='pct' ? `${p}_pct` : p
}
function lblField(){
  const p=S.party.id
  if(S.election==='diff') return S.metric==='pct' ? `${p}_diff_pct_label` : `${p}_diff_voti_label`
  return S.metric==='pct' ? `${p}_label_pct` : `${p}_label_voti`
}

function parensCaption(){
  if(S.election==='diff') return S.metric==='pct' ? '( ) = vote count change' : '( ) = % point change'
  return S.metric==='pct' ? '( ) = absolute votes' : '( ) = % share'
}

// ── BREAKDOWN: PIE (regular) or DIVERGING BARS (diff) ────────────────────────
const pieInstances = {}

function drawBreakdown(props){
  const targets = [
    {canvas:'pieChart', empty:'pieEmpty'},
    {canvas:'mSheetPie', empty:null}
  ]
  if(S.election==='diff') drawDeltaBars(props, targets)
  else drawPie(props, targets)
  document.getElementById('breakdownLbl').textContent = S.election==='diff' ? 'Sezione delta breakdown' : 'Sezione breakdown'
  const mLbl = document.getElementById('mSheetBreakdownLbl')
  if(mLbl) mLbl.textContent = S.election==='diff' ? 'Delta breakdown (2025 - 2024)' : 'Breakdown'
}

function drawPie(props, targets){
  const labels=[],values=[],colors=[]
  PARTIES[S.election].forEach(p=>{
    const col = `${p.id}_pct`
    const v = props[col]
    if(v!=null && !isNaN(v) && v>0){ labels.push(p.label); values.push(+v.toFixed(2)); colors.push(p.color) }
  })
  const cfg = {
    type:'doughnut',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:0,hoverOffset:3}]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'52%',
      plugins:{
        legend:{position:'right',labels:{color:'#6b6760',font:{family:'DM Mono',size:9},boxWidth:8,padding:5}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.toFixed(2)}%`}}
      }
    }
  }
  renderChart(targets, cfg)
}

function drawDeltaBars(props, targets){
  const items = []
  PARTIES.diff.forEach(p=>{
    const col = S.metric==='pct' ? `${p.id}_diff_pct` : `${p.id}_diff_voti`
    const v = props[col]
    if(v!=null && !isNaN(v)) items.push({label:p.label.replace(' ∆',''), value:+v.toFixed(2)})
  })
  items.sort((a,b)=>Math.abs(b.value)-Math.abs(a.value))
  const labels = items.map(i=>i.label)
  const values = items.map(i=>i.value)
  const colors = items.map(i=>i.value>=0 ? '#bf3a3a' : '#3a7abf')
  const u = S.metric==='pct' ? 'pp' : ' voti'
  const cfg = {
    type:'bar',
    data:{labels, datasets:[{data:values, backgroundColor:colors, borderWidth:0, borderRadius:1}]},
    options:{
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>{
          const v=ctx.parsed.x; const sign=v>0?'+':'';
          return ` ${sign}${v.toFixed(2)}${u}`
        }}}
      },
      scales:{
        x:{
          grid:{color:'#1c1c1c', drawBorder:false},
          border:{display:false},
          ticks:{color:'#6b6760', font:{family:'DM Mono', size:9}, callback:v=>`${v>0?'+':''}${v}`}
        },
        y:{
          grid:{display:false},
          border:{display:false},
          ticks:{color:'#6b6760', font:{family:'DM Mono', size:10}}
        }
      }
    }
  }
  renderChart(targets, cfg)
}

function renderChart(targets, cfg){
  targets.forEach(({canvas, empty})=>{
    const c = document.getElementById(canvas); if(!c) return
    if(empty){ const e=document.getElementById(empty); if(e) e.style.display='none' }
    c.style.display='block'
    if(pieInstances[canvas]) pieInstances[canvas].destroy()
    pieInstances[canvas] = new Chart(c, JSON.parse(JSON.stringify(cfg)))
  })
}

function clearBreakdown(){
  ;[['pieChart','pieEmpty'],['mSheetPie',null]].forEach(([cid,eid])=>{
    if(eid){ const e=document.getElementById(eid); if(e) e.style.display='block' }
    const c=document.getElementById(cid); if(c) c.style.display='none'
    if(pieInstances[cid]){ pieInstances[cid].destroy(); delete pieInstances[cid] }
  })
}

// ── BAR CHART (ranked) ────────────────────────────────────────────────────────
const barInstances = {}
let barSorted = []

function drawBar(gj){
  const field = valField()
  barSorted = gj.features.filter(f=>f.properties[field]!=null && !isNaN(f.properties[field])).sort((a,b)=>b.properties[field]-a.properties[field])
  const buildBase = ()=>({
    type:'bar',
    data:{
      labels:barSorted.map(f=>`${f.properties.Sezione}`),
      datasets:[{
        data:barSorted.map(f=>f.properties[field]),
        backgroundColor:barSorted.map((f,i)=> i===lockedBarIdx ? '#c8a96e' : getColor(f.properties[field])),
        borderWidth:0, borderRadius:1
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, animation:{duration:200},
      plugins:{legend:{display:false},
        tooltip:{callbacks:{
          title:i=>`Sez. ${barSorted[i[0].dataIndex]?.properties?.Sezione??''}`,
          label:ctx=>{const p=barSorted[ctx.dataIndex]?.properties; return p?p[lblField()]??ctx.parsed.y:ctx.parsed.y}
        }}},
      scales:{
        x:{ticks:{display:false},grid:{color:'#1c1c1c'},border:{color:'#252525'}},
        y:{ticks:{color:'#6b6760',font:{family:'DM Mono',size:9},maxTicksLimit:4},grid:{color:'#1c1c1c'},border:{color:'#252525'}}
      }
    }
  })
  ;[['barChart',true],['mSheetBar',true]].forEach(([cid,withInteraction])=>{
    const c=document.getElementById(cid); if(!c) return
    if(barInstances[cid]) barInstances[cid].destroy()
    const opts = buildBase()
    if(withInteraction){
      opts.options.onHover = (evt,els)=>{
        if(!geojsonLayer || !S.layerOn) return
        if(!els.length){
          geojsonLayer.eachLayer(l=>{ if(S.locked!==l.feature?.properties?.Sezione) geojsonLayer.resetStyle(l) })
          if(!S.locked){ updateLegendTick(null) }
          return
        }
        const props = barSorted[els[0].index]?.properties; if(!props) return
        const sez = props.Sezione
        geojsonLayer.eachLayer(l=>{
          const s = l.feature?.properties?.Sezione; if(s===S.locked) return
          if(s===sez){ l.setStyle({weight:2,color:'#c8a96e',fillOpacity:.95}); l.bringToFront() }
          else geojsonLayer.resetStyle(l)
        })
        updateLegendTick(props[valField()])
      }
      opts.options.onClick = (evt,els)=>{
        if(!els.length || !geojsonLayer) return
        const sez = barSorted[els[0].index]?.properties?.Sezione
        if(sez==null) return
        geojsonLayer.eachLayer(l=>{
          if(l.feature?.properties?.Sezione===sez){
            l.fire('click')
            map.fitBounds(l.getBounds(), {padding:[40,40], maxZoom:17})
          }
        })
      }
    }
    barInstances[cid] = new Chart(c, opts)
  })
}

function refreshBarColors(){
  Object.entries(barInstances).forEach(([cid,ch])=>{
    if(!ch) return
    ch.data.datasets[0].backgroundColor = barSorted.map((f,i)=> i===lockedBarIdx ? '#c8a96e' : getColor(f.properties[valField()]))
    ch.update('none')
  })
}

function setLockedBarBySezione(sezione){
  if(sezione==null){ lockedBarIdx=null; refreshBarColors(); return }
  const idx = barSorted.findIndex(f=>f.properties.Sezione===sezione)
  lockedBarIdx = idx>=0 ? idx : null
  refreshBarColors()
}

// ── RENDER MAP ────────────────────────────────────────────────────────────────
function applyVis(){
  if(!geojsonLayer)return
  geojsonLayer.eachLayer(l=>{
    const p=l.feature?.properties; const f=valField(); const lk=S.locked===p?.Sezione
    if(S.layerOn) l.setStyle({fillColor:getColor(p?.[f]),fillOpacity:lk?1:.82,color:lk?'#c8a96e':'#0d0d0d',weight:lk?2.5:.6})
    else l.setStyle({fillOpacity:0,color:'#555',weight:.8})
  })
}

function renderMap(gj){
  if(geojsonLayer) map.removeLayer(geojsonLayer)
  const field = valField()
  currentRange = computeRange(gj,field)
  geojsonLayer = L.geoJSON(gj,{
    style:f=>({fillColor:getColor(f.properties[field]),fillOpacity:S.layerOn?.82:0,color:S.layerOn?'#0d0d0d':'#555',weight:.6}),
    onEachFeature:(feature,layer)=>{
      const props = feature.properties
      layer.on('mouseover', function(){
        if(S.locked!==props.Sezione && S.layerOn){ this.setStyle({weight:2,color:'#c8a96e',fillOpacity:.95}); this.bringToFront() }
        // Item 16: legend tick follows hover always
        updateLegendTick(props[valField()])
        // Item 3: only update info text if nothing locked
        if(!S.locked) setInfo(props,false)
      })
      layer.on('mouseout', function(){
        if(S.locked!==props.Sezione) geojsonLayer.resetStyle(this)
        // restore tick to locked value (or hide if none)
        if(S.locked){
          const lp = findPropsBySezione(S.locked)
          if(lp) updateLegendTick(lp[valField()])
        } else {
          updateLegendTick(null)
          clearInfo()
        }
      })
      layer.on('click', function(){
        geojsonLayer.eachLayer(l=>geojsonLayer.resetStyle(l))
        if(S.locked===props.Sezione){
          // toggle off
          S.locked = null
          clearInfo(); clearBreakdown(); setLockedBarBySezione(null); updateLegendTick(null)
          closeMobileSheet(false)
        } else {
          S.locked = props.Sezione
          this.setStyle({weight:2.5,color:'#c8a96e',fillOpacity:1}); this.bringToFront()
          setInfo(props,true); drawBreakdown(props); setLockedBarBySezione(props.Sezione); updateLegendTick(props[valField()])
          if(isMobile()) openMobileSheet(props)
        }
      })
    }
  }).addTo(map)
  updateLegend(); drawBar(gj)
}

function findPropsBySezione(sez){
  if(!geojsonLayer) return null
  let result = null
  geojsonLayer.eachLayer(l=>{ if(l.feature?.properties?.Sezione===sez) result = l.feature.properties })
  return result
}

function openMobileSheet(props){
  document.getElementById('mSheetTitle').textContent = `Sezione ${props.Sezione}`
  document.getElementById('mSheet').classList.add('show')
  document.getElementById('mSheetBackdrop').classList.add('show')
  // Resize charts after sheet opens
  setTimeout(()=>{ Object.values(pieInstances).forEach(c=>c.resize()); Object.values(barInstances).forEach(c=>c.resize()) }, 320)
}

function closeMobileSheet(deselect=true){
  document.getElementById('mSheet').classList.remove('show')
  document.getElementById('mSheetBackdrop').classList.remove('show')
  if(deselect && S.locked!=null){
    S.locked = null
    if(geojsonLayer) geojsonLayer.eachLayer(l=>geojsonLayer.resetStyle(l))
    clearInfo(); clearBreakdown(); setLockedBarBySezione(null); updateLegendTick(null)
  }
}

document.getElementById('mSheetBackdrop').addEventListener('click', ()=>closeMobileSheet(true))

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadData(el){
  if(S.data[el]) return S.data[el]
  try{ const r=await fetch(DATA_URLS[el]); if(!r.ok) throw new Error(`HTTP ${r.status}`); const j=await r.json(); S.data[el]=j; return j }
  catch(e){ alert(`Cannot load data: ${e.message}`); return null }
}
async function update(){
  document.getElementById('loading').classList.remove('hidden')
  S.locked=null; clearInfo(); clearBreakdown(); setLockedBarBySezione(null); updateLegendTick(null); closeMobileSheet(false)
  const gj = await loadData(S.election)
  document.getElementById('loading').classList.add('hidden')
  if(gj) renderMap(gj)
}

let stimer=null
const sinput=document.getElementById('searchInput')
const sresults=document.getElementById('searchResults')
async function doSearch(q){
  if(!q.trim()){ sresults.style.display='none'; return }
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q+', Firenze, Italia')}&limit=5`,{headers:{'Accept-Language':'it,en'}})
    const d=await r.json(); sresults.innerHTML=''
    if(!d.length) sresults.innerHTML='<div class="sri" style="cursor:default;color:#444">No results</div>'
    else d.forEach(item=>{ const div=document.createElement('div'); div.className='sri'; div.textContent=item.display_name; div.onclick=()=>{ map.setView([+item.lat,+item.lon],17); sresults.style.display='none'; sinput.value=item.display_name.split(',')[0] }; sresults.appendChild(div) })
    sresults.style.display='block'
  }catch(e){ console.error(e) }
}
sinput.addEventListener('input',()=>{ clearTimeout(stimer); stimer=setTimeout(()=>doSearch(sinput.value),450) })
document.getElementById('searchBtn').addEventListener('click',()=>doSearch(sinput.value))
sinput.addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(sinput.value) })

document.querySelectorAll('[data-mmetric]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-mmetric]').forEach(b=>b.classList.remove('active')); btn.classList.add('active')
    S.metric=btn.dataset.mmetric
    document.querySelectorAll('[data-metric]').forEach(b=>b.classList.toggle('active',b.dataset.metric===S.metric))
    S.locked=null; clearInfo(); clearBreakdown(); setLockedBarBySezione(null); updateLegendTick(null); closeMobileSheet(false)
    if(S.data[S.election]) renderMap(S.data[S.election])
  })
})

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{ applyLayout() })

// ── INIT ──────────────────────────────────────────────────────────────────────
applyLayout()
fillPartySelects()
update()
</script>
</body>
</html>
